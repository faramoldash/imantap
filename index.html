<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Отключаем автоматическое сохранение скролла браузером
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        </script>
    <title>ImanTap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ✅ Разрешаем нормальный скролл */
        html {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            background-color: #f1f5f9;
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        /* ✅ #root теперь без overflow */
        #root {
            width: 100%;
            min-height: 100%;
            background-color: #f1f5f9;
        }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }
        
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar,
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .dir-rtl {
            direction: rtl;
        }

        /* Smooth transitions for interactive elements */
        button, div {
            transition: all 0.2s ease-in-out;
        }

        /* ✅ XP Animation */
        @keyframes xpFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.8);
            }
            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
            }
            40% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0.9);
            }
        }

        .animate-xp-float {
            animation: xpFloat 2s ease-out forwards;
        }

        /* ═══════════════════════════════
           DARK THEME  (html.dark)
        ═══════════════════════════════ */

        /* Page backgrounds */
        .dark body,
        .dark #root,
        .dark .bg-slate-50 {
            background-color: #0a0f1e !important;
            color: #e2e8f0;
        }

        /* Inner surfaces */
        .dark .bg-slate-100 {
            background: rgba(255, 255, 255, 0.07) !important;
        }

        /* Cards — white → glassmorphism */
        .dark .bg-white {
            background: rgba(255, 255, 255, 0.06) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Navigation — dark opaque glass (overrides bg-white above) */
        .dark nav.bg-white {
            background: rgba(10, 15, 30, 0.96) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
        }
        .dark .border-t.border-slate-200 {
            border-top-color: rgba(255, 255, 255, 0.08) !important;
        }

        /* Text */
        .dark .text-slate-900 { color: #f1f5f9 !important; }
        .dark .text-slate-800 { color: #e2e8f0 !important; }
        .dark .text-slate-700 { color: #cbd5e1 !important; }
        .dark .text-slate-600 { color: #94a3b8 !important; }
        .dark .text-slate-500 { color: #64748b !important; }
        .dark .text-slate-400 { color: #475569 !important; }

        /* Borders */
        .dark .border-slate-100 { border-color: rgba(255, 255, 255, 0.08) !important; }
        .dark .border-slate-200 { border-color: rgba(255, 255, 255, 0.10) !important; }

        /* Tracker active-state buttons */
        .dark .bg-sky-50   { background: rgba(56, 189, 248, 0.12) !important; }
        .dark .bg-emerald-50 { background: rgba(52, 211, 153, 0.12) !important; }

        /* Form elements */
        .dark select,
        .dark input {
            background: rgba(255, 255, 255, 0.06) !important;
            color: #e2e8f0 !important;
            border-color: rgba(255, 255, 255, 0.10) !important;
        }
    </style>
<script type="importmap">

</head>

</body>
</html>
